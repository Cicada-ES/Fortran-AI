<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fortran AI</title>
  <link rel="icon" type="image/x-icon" sizes="192x192" href="/favicon.ico" />
  <link rel="icon" type="image/x-icon" sizes="512x512" href="/favicon-ii.ico" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
  :root {
    --white: #ffffff;
    --gray-50: #fafafa;
    --gray-100: #f5f5f5;
    --gray-200: #e5e5e5;
    --gray-300: #d4d4d4;
    --gray-400: #a3a3a3;
    --gray-500: #737373;
    --gray-600: #525252;
    --gray-700: #404040;
    --gray-800: #262626;
    --gray-900: #171717;
    --black: #000000;
  }

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  html, body {
    height: 100%;
    overflow: hidden; 
  }

  body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0a;
    color: var(--gray-50);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.025) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 60%);
    animation: orbMove 20s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes orbMove {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 1; }
    33% { transform: translate(3%, -2%) scale(1.05); opacity: 0.8; }
    66% { transform: translate(-2%, 3%) scale(0.95); opacity: 0.9; }
  }

  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) translateX(var(--drift)); opacity: 0; }
  }

  .sr-only {
    position: absolute !important;
    height: 1px;
    width: 1px;
    overflow: hidden;
    clip: rect(1px, 1px, 1px, 1px);
    white-space: nowrap;
  }

  header {
    position: relative;
    z-index: 10;
    flex: 0 0 auto;
    background: rgba(15, 15, 15, 0.6);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    padding: 1.75rem 3rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% 120%, rgba(255, 255, 255, 0.03), transparent);
    pointer-events: none;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.2) 50%, transparent 100%);
    animation: headerGlow 3s ease-in-out infinite;
  }

  @keyframes headerGlow {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  .logo-container {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    position: relative;
  }

  .logo-container::before {
    content: '';
    position: absolute;
    left: -1.5rem;
    top: 50%;
    width: 4px;
    height: 40px;
    background: linear-gradient(180deg, transparent 0%, rgba(255, 255, 255, 0.6) 50%, transparent 100%);
    transform: translateY(-50%);
    border-radius: 20px;
    animation: barPulse 2s ease-in-out infinite;
  }

  @keyframes barPulse {
    0%, 100% { opacity: 0.3; height: 35px; }
    50% { opacity: 0.8; height: 45px; }
  }

  .logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.75rem;
    background: linear-gradient(135deg, var(--white) 0%, var(--gray-300) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.02em;
    position: relative;
    text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
    animation: logoFloat 4s ease-in-out infinite;
  }

  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .version-badge {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.7rem;
    color: var(--gray-300);
    background: rgba(255, 255, 255, 0.05);
    padding: 0.4rem 0.85rem;
    border-radius: 2rem;
    border: 1px solid rgba(255, 255, 255, 0.1);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  #tokenCounter {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
    color: var(--gray-100);
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 0.7rem 1.4rem;
    border-radius: 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  #tokenCounter span { position: relative; z-index: 1; }

  #tokenCounter.warning {
    color: #fbbf24;
    border-color: rgba(251, 191, 36, 0.3);
    background: rgba(251, 191, 36, 0.05);
  }

  #tokenCounter.danger {
    color: #f87171;
    border-color: rgba(248, 113, 113, 0.3);
    background: rgba(248, 113, 113, 0.05);
    animation: dangerPulse 1.5s ease-in-out infinite;
  }

  @keyframes dangerPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  main {
    position: relative;
    z-index: 1;
    flex: 1 1 0;
    min-height: 0;
    padding: 2rem 3rem 9rem;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    scrollbar-width: thin;
    scrollbar-color: rgba(255, 255, 255, 0.2) rgba(255, 255, 255, 0.03);
  }

  main::-webkit-scrollbar { width: 8px; }
  main::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.15));
    border-radius: 20px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  main::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.02);
    border-radius: 20px;
  }

  .bubble {
    flex-shrink: 0;
    padding: 1rem 1.5rem;
    border-radius: 1.5rem;
    font-size: 1rem;
    font-weight: 400;
    word-break: break-word;
    overflow-wrap: anywhere;
    line-height: 1.65;
    position: relative;
    animation: messageBeam 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    opacity: 0;
    animation-fill-mode: forwards;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .bot h1, .bot h2, .bot h3, .bot h4 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    color: var(--white);
    margin: 1rem 0 0.4rem;
    line-height: 1.3;
  }
  .bot h1 { font-size: 1.3rem; }
  .bot h2 { font-size: 1.15rem; }
  .bot h3 { font-size: 1.05rem; }
  .bot h1:first-child, .bot h2:first-child, .bot h3:first-child { margin-top: 0; }
  .bot p { margin: 0 0 0.75rem; }
  .bot p:last-child { margin-bottom: 0; }
  .bot strong { color: var(--white); font-weight: 600; }
  .bot em { color: var(--gray-300); font-style: italic; }
  .bot ul, .bot ol {
    margin: 0.5rem 0 0.75rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .bot li { line-height: 1.6; }
  .bot code {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 0.15em 0.45em;
    border-radius: 0.35rem;
    font-family: 'Courier New', monospace;
    font-size: 0.88em;
    color: var(--gray-200);
  }
  .bot pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.75rem;
    padding: 1rem 1.25rem;
    overflow-x: auto;
    margin: 0.75rem 0;
  }
  .bot pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.9em;
    color: var(--gray-100);
  }
  .bot blockquote {
    border-left: 3px solid rgba(255,255,255,0.2);
    margin: 0.75rem 0;
    padding: 0.25rem 0 0.25rem 1rem;
    color: var(--gray-400);
    font-style: italic;
  }
  .bot hr {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 1rem 0;
  }
  .bot a {
    color: var(--gray-300);
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .bot a:hover { color: var(--white); }

  .bot .generated-image {
  max-width: 60%;
  max-height: 320px;
  width: auto;
  height: auto;
  border-radius: 1rem;
  display: block;
  margin-top: 0.5rem;
  object-fit: contain;
}

  .image-loading {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--gray-400);
    font-size: 0.9rem;
    padding: 0.25rem 0;
  }

  .image-loading .spin {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .thinking {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 1rem 1.5rem;
    min-width: 64px;
  }

  .thinking .dot {
    width: 7px;
    height: 7px;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    animation: dotPulse 1.4s ease-in-out infinite;
  }

  .thinking .dot:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
    30% { transform: scale(1.3); opacity: 1; }
  }

  @keyframes messageBeam {
    0% { opacity: 0; transform: translateY(20px) scale(0.96); filter: blur(8px); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  .user {
    align-self: flex-end;
    max-width: 70%;
    width: fit-content;
    white-space: pre-wrap;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.08) 100%);
    color: var(--white);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.05);
    position: relative;
    overflow: hidden;
  }

  .user::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.15), transparent 60%);
    pointer-events: none;
  }

  .bot {
    align-self: flex-start;
    width: 85%;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--gray-100);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    position: relative;
    overflow: hidden;
  }

  .float-input {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    width: min(760px, calc(100% - 4rem));
    display: flex;
    gap: 0.75rem;
    align-items: center;
    z-index: 100;
  }

  .credits {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(760px, calc(100% - 4rem));
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.85);
    font-weight: 500;
    z-index: 100;
    pointer-events: none;
    padding: 0.5rem 0.25rem;
    background: linear-gradient(to top, rgba(10, 10, 10, 0.98) 60%, transparent);
  }

  .credits span { pointer-events: all; }

  .credits a {
    color: rgba(255, 255, 255, 0.85);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .credits a:hover { color: rgba(255, 255, 255, 1); }

  input#userInput {
    flex: 1;
    padding: 1.1rem 1.75rem;
    border-radius: 3rem;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.03);
    color: var(--gray-50);
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    outline: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.02);
  }

  input#userInput::placeholder { color: rgba(255, 255, 255, 0.3); }

  input#userInput:focus {
    border-color: rgba(255, 255, 255, 0.25);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05), inset 0 2px 8px rgba(0, 0, 0, 0.1), 0 4px 20px rgba(255, 255, 255, 0.1);
  }

  button#sendBtn {
    width: 56px; height: 56px; min-width: 56px;
    padding: 0;
    font-size: 1.25rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.08) 100%);
    color: var(--white);
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  button#sendBtn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255, 255, 255, 0.2), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 50%;
  }

  button#sendBtn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s ease, height 0.6s ease;
  }

  button#sendBtn:hover:enabled {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 6px 30px rgba(255, 255, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.12) 100%);
  }

  button#sendBtn:hover:enabled::before { opacity: 1; }
  button#sendBtn:hover:enabled::after { width: 300px; height: 300px; opacity: 0; }
  button#sendBtn:active:enabled { transform: translateY(-1px) scale(1.02); }

  button#sendBtn:disabled {
    background: rgba(255, 255, 255, 0.03);
    color: rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 255, 255, 0.05);
    cursor: not-allowed;
    box-shadow: none;
  }

  button#sendBtn .arrow {
    position: relative;
    z-index: 1;
    display: inline-block;
    transform: rotate(-45deg);
    font-size: 1.25rem;
  }

  #introOverlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1.5s ease;
  }

  #introOverlay.hidden { opacity: 0; pointer-events: none; }

  #introOverlay .logo-animation {
    text-align: center;
    animation: bootUp 2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes bootUp {
    0% { opacity: 0; transform: scale(0.9) translateY(30px); filter: blur(20px); }
    50% { opacity: 0.5; filter: blur(10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  }

  #introOverlay span {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 4rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--white) 0%, var(--gray-400) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
    display: block;
    position: relative;
    filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.3));
  }

  #introOverlay .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--gray-400);
    margin-top: 1.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: subtitleReveal 2s ease 0.5s both;
  }

  @keyframes subtitleReveal {
    0% { opacity: 0; transform: translateY(15px); letter-spacing: 0.3em; }
    100% { opacity: 1; transform: translateY(0); letter-spacing: 0.15em; }
  }

  @media (max-width: 768px) {
    header { padding: 1.25rem 1.5rem; }
    .logo-text { font-size: 1.35rem; }
    main { padding: 1.5rem 1.25rem 8rem; gap: 1rem; }
    .bubble { font-size: 0.875rem; padding: 0.85rem 1.25rem; }
    .user { max-width: 85%; }
    .float-input { width: calc(100% - 2.5rem); bottom: 2rem; }
    .credits { gap: 1rem; font-size: 0.65rem; }
    #introOverlay span { font-size: 2.5rem; }
    button#sendBtn { width: 50px; height: 50px; min-width: 50px; }
    input#userInput { padding: 1rem 1.5rem; }
  }
  </style>

<body>
  <div class="particles" id="particles"></div>

  <div id="introOverlay" aria-hidden="true">
    <div class="logo-animation">
      <span lang="en">Fortran AI</span>
      <div class="subtitle">Cicada 3 Activated</div>
    </div>
  </div>

  <header role="banner">
    <div class="logo-container">
      <div class="logo-text">Fortran AI</div>
      <div class="version-badge">V1.0</div>
    </div>
    <div id="tokenCounter">
      <span>0 / 15000</span>
    </div>
  </header>

  <main id="chat" role="main" aria-label="Conversation Thread" aria-live="polite">
    <div aria-hidden="true" style="height:1px; flex-shrink:0;"></div>
  </main>

  <div class="float-input">
    <label for="userInput" class="sr-only">Prompt</label>
    <input id="userInput" placeholder="Enter your message..." autocomplete="off" />
    <button id="sendBtn" type="button" aria-label="Send message" disabled>
      <span class="arrow">&#10148;</span>
    </button>
  </div>
  <div class="credits">
    <span><a href="https://github.com/Cicada-ES/Fortran-AI/blob/main/Terms%26Conditions.md" target="_blank" rel="noopener noreferrer">Terms &amp; Conditions</a></span>
    <span>Created by Kn3ghtfall</span>
    <span><a href="https://github.com/Cicada-ES/Fortran-AI/blob/main/PrivacyPolicy.md" target="_blank" rel="noopener noreferrer">Privacy Policy</a></span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
  <script>
(() => {
  const chat = document.getElementById('chat')
  const input = document.getElementById('userInput')
  const sendBtn = document.getElementById('sendBtn')
  const tokenCounter = document.getElementById('tokenCounter')
  const introOverlay = document.getElementById('introOverlay')
  const TOKEN_LIMIT = 15000
  const clientId = crypto.randomUUID()

  let messages = []
  let tokenLimitReached = false
  let currentSessionTokens = 0

  function isImageRequest(text) {
    return /\b(generate|create|draw|make|show|render|paint|design|imagine)\b.{0,30}\b(image|picture|photo|illustration|art|artwork|portrait|logo|icon)\b/i.test(text)
      || /^(image|picture|photo|draw|paint) of\b/i.test(text)
  }

  function createParticles() {
    const particlesContainer = document.getElementById('particles')
    const particleCount = 20
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div')
      particle.className = 'particle'
      particle.style.left = Math.random() * 100 + '%'
      particle.style.animationDuration = (Math.random() * 10 + 15) + 's'
      particle.style.animationDelay = Math.random() * 5 + 's'
      particle.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px')
      particlesContainer.appendChild(particle)
    }
  }

  function updateTokenCounter(count) {
    if (count !== undefined) currentSessionTokens = count
    tokenCounter.querySelector('span').textContent = `${currentSessionTokens} / ${TOKEN_LIMIT}`
    tokenCounter.classList.remove('warning', 'danger')
    if (currentSessionTokens >= TOKEN_LIMIT) {
      tokenCounter.classList.add('danger')
    } else if (currentSessionTokens >= TOKEN_LIMIT * 0.8) {
      tokenCounter.classList.add('warning')
    }
    if (currentSessionTokens >= TOKEN_LIMIT) {
      tokenLimitReached = true
      input.disabled = true
      sendBtn.disabled = true
      addBubble('Token limit reached. Please reload the page to start a new session.', false)
    } else {
      tokenLimitReached = false
      input.disabled = false
      sendBtn.disabled = input.value.trim() === ''
    }
  }

  function addBubble(text, isUser) {
  const bubble = document.createElement('div')
  bubble.className = `bubble ${isUser ? 'user' : 'bot'}`
  if (isUser) {
    bubble.textContent = text
  } else {
    bubble.innerHTML = DOMPurify.sanitize(marked.parse(text))
  }
  chat.appendChild(bubble)
    if (isUser) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          chat.scrollTop = chat.scrollHeight
        })
      })
    }
    return bubble
  }

  function addThinkingBubble() {
    const bubble = document.createElement('div')
    bubble.className = 'bubble bot thinking'
    bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>'
    chat.appendChild(bubble)
    return bubble
  }

  function addImageBubble(prompt) {
  const bubble = document.createElement('div')
  bubble.className = 'bubble bot'
  bubble.innerHTML = `
    <div class="image-loading">
      <div class="spin"></div>
      <span>Generating image...</span>
    </div>
  `
  chat.appendChild(bubble)
  chat.scrollTop = chat.scrollHeight

  const img = new Image()
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?nologo=true`

  img.onload = () => {
    bubble.innerHTML = `
      <div class="generated-image-wrapper">
        <img src="${url}" class="generated-image" alt="${prompt}" />
      </div>
    `
    chat.scrollTop = chat.scrollHeight
  }

  img.onerror = () => {
    bubble.innerHTML = marked.parse(
      'Sorry, image generation failed. Try a different prompt.'
    )
  }

  img.src = url
  return bubble
}

  async function sendMessage() {
    if (tokenLimitReached) return
    const rawMessage = input.value.trim()
    if (!rawMessage) return

    addBubble(rawMessage, true)
    messages.push({ role: 'user', content: rawMessage })

    input.value = ''
    input.disabled = true
    sendBtn.disabled = true

    if (isImageRequest(rawMessage)) {
  try {
    const res = await fetch('/image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: rawMessage, clientId }),
    })
    const data = await res.json()

    if (data.error && data.tokensExceeded) {
      addBubble(data.error, false)
      updateTokenCounter(data.sessionTokens)
      return
    }

    if (data.sessionTokens !== undefined) {
      updateTokenCounter(data.sessionTokens)
    } else {
      currentSessionTokens += Math.ceil(rawMessage.trim().split(/\s+/).length * 1.33)
      updateTokenCounter()
    }

    addImageBubble(rawMessage)
    messages.push({ role: 'assistant', content: `[Generated an image for: ${rawMessage}]` })
  } catch {
    currentSessionTokens += Math.ceil(rawMessage.trim().split(/\s+/).length * 1.33)
    addImageBubble(rawMessage)
    messages.push({ role: 'assistant', content: `[Generated an image for: ${rawMessage}]` })
    updateTokenCounter()
  }
  if (!tokenLimitReached) {
    input.disabled = false
    sendBtn.disabled = input.value.trim() === ''
    input.focus()
  }
  return
}

    const thinkingBubble = addThinkingBubble()

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, clientId }),
      })

      if (!res.ok) {
        thinkingBubble.remove()
        addBubble('Something went wrong. Please try again.', false)
        return
      }

      const data = await res.json()

      if (data.tokensExceeded) {
        tokenLimitReached = true
        input.disabled = true
        sendBtn.disabled = true
      }

      thinkingBubble.remove()
      if (data.reply) {
        addBubble(data.reply, false)
        messages.push({ role: 'assistant', content: data.reply })
        updateTokenCounter(data.sessionTokens)
      } else {
        addBubble('No response received.', false)
      }
    } catch (err) {
      thinkingBubble.remove()
      addBubble('Error: ' + err.message, false)
    } finally {
      if (!tokenLimitReached) {
        input.disabled = false
        sendBtn.disabled = input.value.trim() === ''
        input.focus()
      }
    }
  }

  async function checkSessionStatus() {
    try { await fetch('/api/session-check') } catch {}
    updateTokenCounter(0)
  }

  sendBtn.addEventListener('click', sendMessage)
  input.addEventListener('input', () => {
    sendBtn.disabled = input.value.trim() === '' || tokenLimitReached
  })
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      if (!sendBtn.disabled) sendMessage()
    }
  })

  window.onload = () => {
    createParticles()
    input.focus()
    checkSessionStatus()
    setTimeout(() => {
      introOverlay.classList.add('hidden')
    }, 2200)
  }

window.addEventListener('pagehide', () => {
    navigator.sendBeacon('/api/logout-beacon')
  })
})()
  </script>
</body>
</html>
